<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Redirecting...</title>
</head>
<body>
<script>
  (function () {
    var sp = new URLSearchParams(location.search);
    var contentType = sp.get('content_type') || '';
    var language    = sp.get('language')     || '';
    var packName    = sp.get('pack_name')    || '';

    var basePath = location.href.split('?')[0].replace(/\/[^/]*$/, '/');

    ['content_type', 'language', 'pack_name', 'app_name'].forEach(function(k){ sp.delete(k); });
    var queryStr = sp.toString() ? '?' + sp.toString() : '';

    location.replace(basePath + packName + '/' + contentType + '_' + language + '.html' + queryStr);
  })();
</script>
</body>
</html>
